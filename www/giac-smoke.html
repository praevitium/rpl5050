<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Giac smoke test</title>
    <style>
      body {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #111;
        color: #ddd;
        padding: 1rem;
      }
      h1 {
        font-weight: 500;
        margin-top: 0;
        color: #6cf;
      }
      .row {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        margin: 0.25rem 0;
      }
      .cmd {
        color: #ff9;
      }
      .ok {
        color: #9f9;
      }
      .err {
        color: #f88;
      }
      .ms {
        color: #888;
        min-width: 5rem;
        text-align: right;
      }
      #log {
        white-space: pre-wrap;
        line-height: 1.4;
      }
      #repl {
        margin-top: 1rem;
        display: flex;
        gap: 0.5rem;
      }
      #replInput {
        flex: 1;
        background: #222;
        color: #ddd;
        border: 1px solid #444;
        padding: 0.4rem;
        font-family: inherit;
      }
      button {
        background: #246;
        color: #ddd;
        border: 1px solid #468;
        padding: 0.4rem 0.8rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Giac smoke test</h1>
    <p>
      Loads the vendored Giac WASM engine in a Web Worker, runs a handful of
      CAS calls, and reports timings. Use the REPL below for ad hoc probes.
    </p>
    <div id="log"></div>
    <div id="repl">
      <input
        id="replInput"
        type="text"
        placeholder="caseval expression (e.g. factor(x^2-1))"
      />
      <button id="replRun">Run</button>
    </div>

    <script type="module">
      import { giac } from "./src/rpl/cas/giac-engine.mjs";

      const log = document.getElementById("log");
      const line = (cls, t) => {
        const div = document.createElement("div");
        div.className = "row";
        div.innerHTML = `<span class="ms">${t.ms.toFixed(1).padStart(7)}ms</span> <span class="${cls}">${t.text}</span>`;
        log.appendChild(div);
      };
      const stamp = (text) => ({ text, ms: performance.now() - t0 });

      const t0 = performance.now();
      line("", stamp("[start]"));

      const CASES = [
        "version",
        "1+2",
        "factor(x^2-1)",
        "factor(x^4-1)",
        "expand((x+1)^3)",
        "expand((a+b)^5)",
        "diff(sin(x)*x, x)",
        "integrate(x^2, x)",
        "integrate(1/(x^2+1), x)",
        "solve(x^2-1, x)",
        "solve(x^2+2*x+5, x)",
        "simplify((x^2-1)/(x-1))",
        "series(sin(x), x, 0, 6)",
        "limit(sin(x)/x, x, 0)",
        "latex(factor(x^2-1))",
        "latex(integrate(x^2, x))",
        "100!",
      ];

      async function runAll() {
        try {
          await giac.init();
          line("ok", stamp("[ready]"));
        } catch (err) {
          line("err", stamp(`[init failed] ${err.message}`));
          return;
        }
        for (const c of CASES) {
          const t1 = performance.now();
          try {
            const r = await giac.caseval(c);
            const dt = performance.now() - t1;
            const div = document.createElement("div");
            div.className = "row";
            div.innerHTML = `<span class="ms">${dt.toFixed(1).padStart(7)}ms</span> <span class="cmd">${c.replace(/</g, "&lt;")}</span> <span class="ok">=&gt; ${String(r).replace(/</g, "&lt;")}</span>`;
            log.appendChild(div);
          } catch (err) {
            const dt = performance.now() - t1;
            const div = document.createElement("div");
            div.className = "row";
            div.innerHTML = `<span class="ms">${dt.toFixed(1).padStart(7)}ms</span> <span class="cmd">${c.replace(/</g, "&lt;")}</span> <span class="err">!! ${err.message}</span>`;
            log.appendChild(div);
          }
        }
      }

      document.getElementById("replRun").addEventListener("click", async () => {
        const input = document.getElementById("replInput");
        const cmd = input.value.trim();
        if (!cmd) return;
        const t1 = performance.now();
        try {
          const r = await giac.caseval(cmd);
          const dt = performance.now() - t1;
          const div = document.createElement("div");
          div.className = "row";
          div.innerHTML = `<span class="ms">${dt.toFixed(1).padStart(7)}ms</span> <span class="cmd">${cmd.replace(/</g, "&lt;")}</span> <span class="ok">=&gt; ${String(r).replace(/</g, "&lt;")}</span>`;
          log.appendChild(div);
        } catch (err) {
          const div = document.createElement("div");
          div.className = "row";
          div.innerHTML = `<span class="cmd">${cmd.replace(/</g, "&lt;")}</span> <span class="err">!! ${err.message}</span>`;
          log.appendChild(div);
        }
        input.value = "";
      });
      document
        .getElementById("replInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") document.getElementById("replRun").click();
        });

      runAll();
    </script>
  </body>
</html>
